    <style>

  <body oncontextmenu="return false;" class="bg-gray-100 text-gray-800 text-sm md:text-[16px] p-2 md:p-8 flex items-center justify-center min-h-screen">
    <div
      class="container bg-white rounded-xl shadow-lg p-4 md:p-10 w-full max-w-3xl"
    >
      <h1 class="text-3xl font-bold text-center mb-6">Simulacro Examen Final</h1>

      <div id="login-screen" class="mb-6">
        <label class="block text-lg font-medium text-gray-700 mb-2"
          >Nombre y Apellidos:</label
        >
        <input
          type="text"
          id="student-name"
          class="block w-full px-4 py-3 border border-gray-300 rounded-md shadow-sm mb-4 text-lg"
          placeholder="Ej. Ana Lopez (sin tildes)"
        />
        <button
          id="start-btn"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg"
        >
          Comenzar Examen
        </button>
      </div>

      <div id="quiz-container" class="hidden"></div>

      <div id="nav-buttons" class="flex justify-between mt-6 hidden">
        <button
          id="prev-btn"
          class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-6 rounded-lg disabled:opacity-50"
        >
          Anterior
        </button>
        <span
          id="progress"
          class="self-center font-medium text-gray-500"
        ></span>
        <button
          id="next-btn"
          class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg"
        >
          Siguiente
        </button>
      </div>
    </div>

    <script>
      let currentQuestionIndex = 0;
      let finalQuestions = [];
      let studentAnswers = {}; // Guardará { id_pregunta: "Respuesta elegida" }
      let studentName = "";

      const loginScreen = document.getElementById("login-screen");
      const quizContainer = document.getElementById("quiz-container");
      const navButtons = document.getElementById("nav-buttons");
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      const startBtn = document.getElementById("start-btn");
      const progressText = document.getElementById("progress");

      // Empezar el examen
      startBtn.addEventListener("click", () => {
        studentName = document.getElementById("student-name").value.trim();
        if (!studentName) {
          alert("Debes introducir tu nombre para hacer el examen.");
          return;
        }

        // misPreguntas viene del archivo preguntas.js
        if (typeof misPreguntas === "undefined" || misPreguntas.length === 0) {
          alert("Error: No se ha cargado el archivo de preguntas.");
          return;
        }

        finalQuestions = misPreguntas; // Si quieres mezclarlas, llama a tu función shuffleArray(misPreguntas) aquí
        loginScreen.classList.add("hidden");
        quizContainer.classList.remove("hidden");
        navButtons.classList.remove("hidden");
        renderQuestion();
      });

      function renderQuestion() {
        quizContainer.innerHTML = "";

        // Si hemos llegado al final
        if (currentQuestionIndex >= finalQuestions.length) {
          showFinalScreen();
          return;
        }

        const q = finalQuestions[currentQuestionIndex];
        progressText.textContent = `Pregunta ${currentQuestionIndex + 1} de ${finalQuestions.length}`;

        const card = document.createElement("div");

        const questionTitle = document.createElement("div");
        questionTitle.className = "text-lg font-semibold mb-4 text-gray-900";
        questionTitle.textContent = `${currentQuestionIndex + 1}. ${q.question}`;
        card.appendChild(questionTitle);

        // Renderizar opciones
        q.options.forEach((optionText) => {
          const option = document.createElement("div");
          option.className = "option";
          option.textContent = optionText;

          // Si ya la había respondido antes, la marcamos
          if (studentAnswers[q.id] === optionText) {
            option.classList.add("selected");
          }

          option.addEventListener("click", () => {
            // Quitar selección a las demás
            const allOptions = card.querySelectorAll(".option");
            allOptions.forEach((opt) => opt.classList.remove("selected"));

            // Seleccionar esta y guardar en memoria
            option.classList.add("selected");
            studentAnswers[q.id] = optionText;
          });

          card.appendChild(option);
        });

        quizContainer.appendChild(card);
        prevBtn.disabled = currentQuestionIndex === 0;
        nextBtn.textContent =
          currentQuestionIndex === finalQuestions.length - 1
            ? "Terminar y Descargar"
            : "Siguiente";
      }

      function showFinalScreen() {
        navButtons.classList.add("hidden");
        quizContainer.innerHTML = `
                <div class="text-center py-8">
                    <h2 class="text-3xl font-bold mb-4 text-green-600">¡Examen Completado!</h2>
                    <p class="text-lg mb-8 text-gray-600">Has respondido ${Object.keys(studentAnswers).length} de ${finalQuestions.length} preguntas.</p>
                    <button id="download-btn" class="bg-green-600 hover:bg-green-700 text-white text-xl font-bold py-4 px-8 rounded-lg shadow-lg">
                        📥 Descargar Respuestas
                    </button>
                    <p class="mt-4 text-sm text-gray-500">Sube el archivo descargado al aula virtual.</p>
                </div>
            `;

        document
          .getElementById("download-btn")
          .addEventListener("click", generateCSV);
      }

      function generateCSV() {
        let csvContent = "ID Pregunta,Pregunta,Respuesta Seleccionada\n";

        finalQuestions.forEach((q) => {
          // Si la dejó en blanco, ponemos "Sin responder"
          let ans = studentAnswers[q.id]
            ? studentAnswers[q.id].replace(/,/g, "")
            : "Sin responder";
          let cleanQuestion = q.question.replace(/,/g, ""); // Quitamos comas para no romper el CSV
          csvContent += `${q.id},${cleanQuestion},${ans}\n`;
        });

        let blob = new Blob([new Uint8Array([0xef, 0xbb, 0xbf]), csvContent], {
          type: "text/csv;charset=utf-8;",
        });
        let link = document.createElement("a");
        let cleanName = studentName.replace(/[^a-zA-Z0-9]/g, "_");
        link.href = URL.createObjectURL(blob);
        link.download = `Examen_${cleanName}.csv`;
        link.click();
      }

      prevBtn.addEventListener("click", () => {
        if (currentQuestionIndex > 0) {
          currentQuestionIndex--;
          renderQuestion();
        }
      });

      nextBtn.addEventListener("click", () => {
        currentQuestionIndex++;
        renderQuestion();
      });
      // ==========================================
        // 3. SEGURIDAD ANTI-COPIA
        // ==========================================
        document.addEventListener('keydown', function(e) {
            // Bloquear F12 (Herramientas de desarrollador)
            if (e.key === 'F12') {
                e.preventDefault();
            }
            // Bloquear atajos con Ctrl o Cmd (Mac)
            if (e.ctrlKey || e.metaKey) {
                const teclasBloqueadas = ['c', 'v', 'x', 'p', 'u', 's', 'a']; // Copiar, Pegar, Cortar, Imprimir, Ver código, Guardar, Seleccionar todo
                if (teclasBloqueadas.includes(e.key.toLowerCase())) {
                    e.preventDefault();
                }
            }
        });
    </script>
  </body>
</html>
